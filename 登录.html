<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>登录 - 不凡智库社区</title>
  <style>
    :root{--bg:#f4f6f8;--panel:#fff;--line:#e5e9ef;--red:#df1d2d;--blue:#246bfe;--muted:#6d7480;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Microsoft YaHei",sans-serif}
    *{box-sizing:border-box}body{margin:0;min-height:100vh;background:var(--bg);display:grid;place-items:center;color:#20242a}.card{width:min(420px,calc(100vw - 32px));background:#fff;border:1px solid var(--line);border-radius:10px;padding:28px;box-shadow:0 12px 30px rgba(23,31,42,.08)}h1{margin:0 0 6px;color:var(--red)}p{margin:0 0 18px;color:var(--muted)}label{display:block;margin:12px 0 6px;font-weight:700}input{width:100%;height:40px;border:1px solid #d9dfe8;border-radius:6px;padding:0 10px}.row{display:grid;grid-template-columns:minmax(0,1fr) 110px;gap:8px}.btn{height:40px;border:1px solid var(--line);border-radius:6px;background:#fff;padding:0 12px}.primary{width:100%;margin-top:18px;background:var(--red);border-color:var(--red);color:#fff;font-weight:800}.links{margin-top:14px;display:flex;justify-content:space-between}.links a{color:var(--blue);text-decoration:none}
  </style>
</head>
<body>
  <main class="card"><h1>登录不凡智库社区</h1><p>登录后可以评论、发帖、发布悬赏、查看他人主页。</p><label>手机号</label><input placeholder="请输入手机号" /><label>验证码登录</label><div class="row"><input placeholder="请输入验证码" /><button class="btn" type="button">获取验证码</button></div><label>密码登录</label><input type="password" placeholder="也可以输入密码登录" /><button class="btn primary" type="button">登录</button><div class="links"><a href="不凡智库工程师社区首页原型.html">返回首页</a><a href="我的主页.html">查看登录后主页示例</a></div></main>
</body>
</html>
